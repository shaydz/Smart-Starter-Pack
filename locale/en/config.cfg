[mod-setting-description]
ssp-k2-remove-fuel-requirement=If checked, removes the fuel requirement that Krastorio 2 adds to personal equipment generators and spidertron power sources, reverting them to vanilla-style free power. Requires game restart.
ssp-enable-universal=If checked, players will receive a starting set of repair packs.
ssp-repair-pack-count=Number of repair packs to give.
ssp-enable-mining-drones=If checked, players will receive starting mining drones and depots (if the Mining Drones Remastered mod is active).
ssp-mining-drone-count=Number of mining drones to give.
ssp-mining-depot-count=Number of mining depots to give.
ssp-enable-aai-loaders=If checked, players will receive starting loaders (if the AAI Loaders mod is active).
ssp-aai-loader-count=Number of AAI loaders to give.
ssp-give-armor=If checked, players will receive power armor (under K2) or modular armor (under Vanilla), prefilled with generators/solar panels and batteries. If unchecked, players will not receive any armor.
ssp-enable-k2=If checked, players will receive the Krastorio 2 starting items (if Krastorio 2 mod is active).
ssp-k2-robot-count=Number of construction robots to give in the Krastorio 2 pack.
ssp-enable-vanilla-armor=If checked, players will receive the Vanilla starting items (modular armor and robots, if Krastorio 2 is not active).
ssp-vanilla-robot-count=Number of construction robots to give in the Vanilla pack.
